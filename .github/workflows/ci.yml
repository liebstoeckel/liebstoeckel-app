# CI for the PUBLIC mirror (limond/liebstoeckel-app-public): external pull
# requests get typecheck + the unit/integration tier. The private repo has its
# own in-cluster CI; the repository guard below makes this workflow a no-op
# there, so the file can live in the (mirrored) source of truth.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    if: github.repository == 'limond/liebstoeckel-app-public'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # Plain install (not frozen): the mirrored tree intentionally lacks the
      # private workspace packages recorded in the upstream lockfile.
      - run: bun install
      - run: bun run typecheck
      - run: bun test packages
